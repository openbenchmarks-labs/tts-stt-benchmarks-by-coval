name: Sync Coval benchmarks

# Daily mirror of Coval's public voice benchmark (TTS + STT).
# Pulls Coval's API, writes coval-benchmarks.json, commits if it changed.
# No secrets: Coval's API is public, and we commit to this repo with the
# default GITHUB_TOKEN (contents: write).

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch: {} # allow manual "Run workflow"

permissions:
  contents: write

concurrency:
  group: coval-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Pull Coval snapshot
        env:
          COVAL_OUT_PATH: coval-benchmarks.json
        run: node ingest-coval.mjs

      - name: Commit if changed
        run: |
          if [[ -n "$(git status --porcelain coval-benchmarks.json)" ]]; then
            git config user.name "coval-sync[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add coval-benchmarks.json
            git commit -m "chore: daily Coval sync ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
            echo "published updated snapshot"
          else
            echo "no change — snapshot identical, nothing to publish"
          fi
